name: Build and upload to PyPI

# When to run this script
on:

  release:
    types: [published]

  # Allows manual triggering from GitHub interface
  workflow_dispatch:
  
  # For testing - on pushes to main branch
  push:
    branches:
      - main

jobs:
  # Job for building wheels
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # Matrix of operating systems
      matrix:
        os: [
          ubuntu-latest,          # Linux x86_64
          windows-latest,         # Windows x86_64
          macos-latest,           # macOS Silicon
        ]
    
    steps:
      # Step 1: Clone the repository
      - uses: actions/checkout@v4
      
      # Step 2: Set up Python (required for cibuildwheel)
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      
      # Step 3: Install build dependencies
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cibuildwheel
      
      # Step 4: Build wheels using cibuildwheel
      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          # Additional environment variables if needed
          CIBW_BEFORE_BUILD: pip install numpy cython
          CIBW_BUILD_VERBOSITY: 1
      
      # Step 5: Save built wheels as artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl


  upload_pypi:
    name: Upload to PyPI
    needs: [build_wheels]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      
      - name: Upload to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          pip install twine
          twine upload dist/*.whl